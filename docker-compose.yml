services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=sqlite:///./skillbridge.db
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./backend/skillbridge.db:/app/skillbridge.db

  frontend:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
